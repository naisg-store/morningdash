<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Morning Weather Brief</title>
<style>
  :root{
    --bg:#0F172A;
    --bg-deep:#0A1120;
    --panel:rgba(30,41,59,0.55);
    --panel-border:rgba(148,163,184,0.14);
    --text:#E7ECF5;
    --muted:#8CA0B8;
    --muted-dim:#5C6B82;
    --cyan:#38BDF8;
    --teal:#2DD4BF;
    --violet:#A78BFA;
    --amber:#FBBF24;
    --red:#F87171;
    --track:rgba(148,163,184,0.16);
    --radius-lg:20px;
    --radius-md:14px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(circle at 15% 0%, rgba(56,189,248,0.10), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(167,139,250,0.09), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
  }

  .wrap{
    max-width:820px;
    margin:0 auto;
    padding:28px 18px 40px;
    display:flex;
    flex-direction:column;
    gap:16px;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header.brief-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    padding:18px 22px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .brand .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--cyan);
    font-weight:700;
  }
  .brand h1{
    margin:0;
    font-size:19px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .location-line{
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .location-line .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
    flex-shrink:0;
  }
  .clock-block{
    text-align:right;
    flex-shrink:0;
  }
  .clock-time{
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .clock-date{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }

  /* ---------- Gauges ---------- */
  .gauge-row{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
  }
  .gauge-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:14px 10px 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .gauge-card svg{
    width:100%;
    height:auto;
    display:block;
  }
  .gauge-track{
    fill:none;
    stroke:var(--track);
    stroke-width:14;
    stroke-linecap:round;
  }
  .gauge-fill{
    fill:none;
    stroke-width:14;
    stroke-linecap:round;
    transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1);
  }
  .gauge-fill.temp{stroke:var(--cyan);filter:drop-shadow(0 0 6px rgba(56,189,248,0.55));}
  .gauge-fill.humidity{stroke:var(--teal);filter:drop-shadow(0 0 6px rgba(45,212,191,0.55));}
  .gauge-fill.rain{stroke:var(--violet);filter:drop-shadow(0 0 6px rgba(167,139,250,0.55));}

  .gauge-value{
    font-size:26px;
    font-weight:800;
    fill:var(--text);
  }
  .gauge-unit{
    font-size:11px;
    font-weight:600;
    fill:var(--muted);
  }
  .gauge-label{
    margin-top:-6px;
    font-size:11px;
    letter-spacing:0.10em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
  }

  /* ---------- Advice box ---------- */
  .advice-box{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .advice-icon{
    font-size:28px;
    flex-shrink:0;
    line-height:1;
  }
  .advice-text-block .advice-eyebrow{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:700;
    margin-bottom:3px;
  }
  .advice-text{
    font-size:15px;
    line-height:1.45;
    color:var(--text);
  }

  /* ---------- Ticker ---------- */
  .ticker{
    background:#000;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius-md);
    overflow:hidden;
    position:relative;
    height:42px;
    display:flex;
    align-items:center;
  }
  .ticker .live-tag{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:6px;
    background:#1a0000;
    color:var(--red);
    font-size:11px;
    font-weight:800;
    letter-spacing:0.08em;
    padding:0 12px;
    height:100%;
    display:flex;
    align-items:center;
    border-right:1px solid rgba(255,255,255,0.08);
    z-index:2;
    font-family:'Courier New',monospace;
  }
  .live-tag .pulse{
    width:7px;height:7px;border-radius:50%;
    background:var(--red);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.35;transform:scale(0.75);}
  }
  .ticker-viewport{
    flex:1;
    overflow:hidden;
    height:100%;
    position:relative;
  }
  .ticker-track{
    position:absolute;
    white-space:nowrap;
    display:flex;
    align-items:center;
    height:100%;
    animation:marquee 28s linear infinite;
    will-change:transform;
  }
  .ticker-track span{
    font-family:'Courier New',monospace;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.02em;
    color:#F1F5F9;
    padding-right:48px;
  }
  .ticker-track span.hazard{color:var(--amber);}
  .ticker-track span.clear{color:var(--teal);}
  @keyframes marquee{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
  }

  footer.foot-note{
    text-align:center;
    font-size:11px;
    color:var(--muted-dim);
    padding-top:4px;
  }

  @media (max-width:560px){
    .gauge-row{grid-template-columns:1fr;}
    .gauge-card{flex-direction:row;align-items:center;gap:14px;padding:12px 16px;}
    .gauge-card svg{width:110px;flex-shrink:0;}
    header.brief-header{flex-direction:column;}
    .clock-block{text-align:left;}
  }

  a{color:var(--cyan);}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">

  <header class="brief-header">
    <div class="brand">
      <div class="eyebrow">Morning Weather Brief</div>
      <h1 id="city-name">Locating you…</h1>
      <div class="location-line"><span class="dot"></span><span id="region-name">—</span></div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">—</div>
    </div>
  </header>

  <section class="gauge-row">
    <div class="gauge-card">
      <svg viewBox="0 0 200 130" aria-label="Temperature gauge">
        <path class="gauge-track" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <path class="gauge-fill temp" id="gauge-temp-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <text x="100" y="85" text-anchor="middle" class="gauge-value" id="gauge-temp-val">--</text>
        <text x="100" y="103" text-anchor="middle" class="gauge-unit">°F</text>
      </svg>
      <div class="gauge-label">Temperature</div>
    </div>

    <div class="gauge-card">
      <svg viewBox="0 0 200 130" aria-label="Humidity gauge">
        <path class="gauge-track" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <path class="gauge-fill humidity" id="gauge-humidity-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <text x="100" y="85" text-anchor="middle" class="gauge-value" id="gauge-humidity-val">--</text>
        <text x="100" y="103" text-anchor="middle" class="gauge-unit">%</text>
      </svg>
      <div class="gauge-label">Humidity</div>
    </div>

    <div class="gauge-card">
      <svg viewBox="0 0 200 130" aria-label="Rain probability gauge">
        <path class="gauge-track" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <path class="gauge-fill rain" id="gauge-rain-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
        <text x="100" y="85" text-anchor="middle" class="gauge-value" id="gauge-rain-val">--</text>
        <text x="100" y="103" text-anchor="middle" class="gauge-unit">%</text>
      </svg>
      <div class="gauge-label">Rain Chance</div>
    </div>
  </section>

  <section class="advice-box">
    <div class="advice-icon" id="advice-icon">🌤️</div>
    <div class="advice-text-block">
      <div class="advice-eyebrow">Morning Advice</div>
      <div class="advice-text" id="advice-text">Reading today's conditions…</div>
    </div>
  </section>

  <section class="ticker" role="status" aria-live="polite">
    <div class="live-tag"><span class="pulse"></span>HAZARDS</div>
    <div class="ticker-viewport">
      <div class="ticker-track" id="ticker-track">
        <span>Loading commute conditions…</span>
        <span>Loading commute conditions…</span>
      </div>
    </div>
  </section>

  <footer class="foot-note">Data via Open-Meteo · Refreshes every 15 minutes · No ads, no bloat</footer>
</div>

<script>
(function(){
  "use strict";

  var CACHE_KEY = "morningWeatherBrief.cache";
  var CACHE_TTL_MS = 15 * 60 * 1000;

  var els = {
    city: document.getElementById("city-name"),
    region: document.getElementById("region-name"),
    time: document.getElementById("clock-time"),
    date: document.getElementById("clock-date"),
    adviceIcon: document.getElementById("advice-icon"),
    adviceText: document.getElementById("advice-text"),
    ticker: document.getElementById("ticker-track"),
    gauges: {
      temp:     { arc: document.getElementById("gauge-temp-arc"),     val: document.getElementById("gauge-temp-val"),     min:0, max:120 },
      humidity: { arc: document.getElementById("gauge-humidity-arc"), val: document.getElementById("gauge-humidity-val"), min:0, max:100 },
      rain:     { arc: document.getElementById("gauge-rain-arc"),     val: document.getElementById("gauge-rain-val"),     min:0, max:100 }
    }
  };

  var GAUGE_RADIUS = 80;
  var ARC_LENGTH = Math.PI * GAUGE_RADIUS;

  Object.keys(els.gauges).forEach(function(key){
    var g = els.gauges[key];
    g.arc.style.strokeDasharray = ARC_LENGTH;
    g.arc.style.strokeDashoffset = ARC_LENGTH;
  });

  // ---------------- Clock ----------------
  function tickClock(){
    var now = new Date();
    els.time.textContent = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    els.date.textContent = now.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------------- Gauge rendering ----------------
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function setGauge(key, rawValue, displayValue){
    var g = els.gauges[key];
    var v = clamp(rawValue, g.min, g.max);
    var frac = (v - g.min) / (g.max - g.min);
    var offset = ARC_LENGTH * (1 - frac);
    g.val.textContent = (displayValue !== undefined ? displayValue : Math.round(rawValue));
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        g.arc.style.strokeDashoffset = offset;
      });
    });
  }

  // ---------------- Advice rules engine ----------------
  function getAdvice(c){
    var t = c.temp, h = c.humidity, wind = c.wind, precipProb = c.precipProb, code = c.code;

    var rules = [
      { test: t >= 90,
        icon:"🔥", msg:"Scorcher out there — crank the AC before you even buckle in." },
      { test: t <= 32,
        icon:"🧊", msg:"Below freezing this morning — scrape the windshield and take corners slow." },
      { test: t < 40 && wind > 15,
        icon:"🥶", msg:"Bitter wind chill on top of the cold — that light jacket won't cut it today." },
      { test: h > 70 && t > 65 && precipProb > 20,
        icon:"💧", msg:"Muggy with a side of drizzle — expect fogged-up windows for the first few miles." },
      { test: wind > 20,
        icon:"💨", msg:"Hold onto your hat — gusty winds could nudge you around the lane." },
      { test: precipProb > 50,
        icon:"☔", msg:"Rain's basically guaranteed — grab the umbrella and pad your commute by a few minutes." },
      { test: code === 45 || code === 48,
        icon:"🌫️", msg:"Fog's rolling in — ease off the gas and give yourself extra following distance." },
      { test: h > 80 && precipProb <= 20,
        icon:"😓", msg:"Sticky air with no rain in sight — just an uncomfortable kind of humid." },
      { test: t >= 60 && t <= 80 && (code === 0 || code === 1),
        icon:"☀️", msg:"Clear skies and comfortable temps — about as good as mornings get." },
      { test: t < 55 && (code === 0 || code === 1 || code === 2),
        icon:"🧥", msg:"Crisp and clear — light jacket weather, nothing dramatic." }
    ];

    for (var i = 0; i < rules.length; i++){
      if (rules[i].test) return rules[i];
    }
    return { icon:"🌤️", msg:"Standard-issue morning out there — nothing wild, just get out the door." };
  }

  // ---------------- Hazard ticker ----------------
  function buildHazards(c){
    var hazards = [];
    if (c.visibilityMiles !== null && c.visibilityMiles < 3){
      hazards.push({ text:"FOG ALERT: Reduced morning visibility.", type:"hazard" });
    }
    if (c.precipProb > 20 || c.precip > 0.01){
      hazards.push({ text:"SLIPPERY ROADS: Drizzle/rain expected on the morning commute.", type:"hazard" });
    }
    if (c.wind > 18){
      hazards.push({ text:"HIGH WIND CAUTION: Watch for gusts on the highway.", type:"hazard" });
    }
    if (c.temp > 85){
      hazards.push({ text:"HEAT ADVISORY: Expect warm cabin temps before the AC kicks in.", type:"hazard" });
    }
    if (hazards.length === 0){
      hazards.push({ text:"COMMUTE CLEAR: Optimal driving conditions across all routes.", type:"clear" });
    }
    return hazards;
  }

  function renderTicker(hazards){
    var sep = "   //   ";
    var html = hazards.map(function(hz){
      return '<span class="' + hz.type + '">' + hz.text + '</span>';
    }).join("");
    // duplicate content for seamless marquee loop
    els.ticker.innerHTML = html + html;
  }

  // ---------------- Weather code -> visual mapping (kept minimal, informational) ----------------

  // ---------------- Cache helpers ----------------
  function readCache(lat, lon){
    try{
      var raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var fresh = (Date.now() - parsed.timestamp) < CACHE_TTL_MS;
      var sameSpot = Math.abs(parsed.lat - lat) < 0.05 && Math.abs(parsed.lon - lon) < 0.05;
      if (fresh && sameSpot) return parsed;
      return null;
    }catch(e){ return null; }
  }

  function writeCache(lat, lon, weatherData, place){
    try{
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        lat: lat, lon: lon,
        weather: weatherData,
        place: place
      }));
    }catch(e){ /* storage unavailable — non-fatal */ }
  }

  // ---------------- Rendering pipeline ----------------
  function renderPlace(place){
    els.city.textContent = place.city || "Your Location";
    els.region.textContent = place.state ? (place.state + (place.country ? ", " + place.country : "")) : (place.country || "Live conditions");
  }

  function findCurrentHourIndex(hourly, currentIsoHour){
    if (!hourly || !hourly.time) return 0;
    var idx = hourly.time.indexOf(currentIsoHour);
    return idx >= 0 ? idx : 0;
  }

  function renderWeather(weatherData){
    var current = weatherData.current;
    var hourly = weatherData.hourly;

    var now = new Date();
    var pad = function(n){ return String(n).padStart(2,"0"); };
    var currentIsoHour = now.getFullYear() + "-" + pad(now.getMonth()+1) + "-" + pad(now.getDate()) + "T" + pad(now.getHours()) + ":00";
    var hIdx = findCurrentHourIndex(hourly, currentIsoHour);

    var temp = current.temperature_2m;
    var humidity = current.relative_humidity_2m;
    var precip = current.precipitation;
    var wind = current.wind_speed_10m;
    var code = current.weather_code;

    var precipProb = (hourly && hourly.precipitation_probability) ? hourly.precipitation_probability[hIdx] : 0;
    var visibilityMeters = (hourly && hourly.visibility) ? hourly.visibility[hIdx] : null;
    var visibilityMiles = (visibilityMeters !== null && visibilityMeters !== undefined) ? (visibilityMeters / 1609.34) : null;

    setGauge("temp", temp, Math.round(temp));
    setGauge("humidity", humidity, Math.round(humidity));
    setGauge("rain", precipProb, Math.round(precipProb));

    var advice = getAdvice({ temp:temp, humidity:humidity, wind:wind, precipProb:precipProb, code:code });
    els.adviceIcon.textContent = advice.icon;
    els.adviceText.textContent = advice.msg;

    var hazards = buildHazards({ temp:temp, wind:wind, precip:precip, precipProb:precipProb, visibilityMiles:visibilityMiles });
    renderTicker(hazards);
  }

  // ---------------- Data fetching ----------------
  function fetchWeather(lat, lon){
    var url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon +
      "&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m" +
      "&hourly=temperature_2m,precipitation_probability,visibility" +
      "&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto";
    return fetch(url).then(function(r){
      if (!r.ok) throw new Error("Open-Meteo request failed");
      return r.json();
    });
  }

  function reverseGeocode(lat, lon){
    var url = "https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" + lat + "&longitude=" + lon + "&localityLanguage=en";
    return fetch(url).then(function(r){
      if (!r.ok) throw new Error("Reverse geocode failed");
      return r.json();
    }).then(function(d){
      return {
        city: d.city || d.locality || d.principalSubdivision || "Your Location",
        state: d.principalSubdivisionCode ? d.principalSubdivisionCode.split("-").pop() : (d.principalSubdivision || ""),
        country: d.countryCode || ""
      };
    }).catch(function(){
      return { city:"Your Location", state:"", country:"" };
    });
  }

  function loadFromCoords(lat, lon, placeHint){
    var cached = readCache(lat, lon);
    if (cached){
      renderPlace(cached.place);
      renderWeather(cached.weather);
      return;
    }

    var placePromise = placeHint ? Promise.resolve(placeHint) : reverseGeocode(lat, lon);

    placePromise.then(function(place){
      renderPlace(place);
      fetchWeather(lat, lon).then(function(weatherData){
        renderWeather(weatherData);
        writeCache(lat, lon, weatherData, place);
      }).catch(function(){
        els.adviceText.textContent = "Live weather data is unavailable right now — check back shortly.";
        renderTicker([{ text:"DATA UNAVAILABLE: Unable to reach the weather service.", type:"hazard" }]);
      });
    });
  }

  function fallbackToIp(){
    fetch("https://ipapi.co/json/").then(function(r){
      if (!r.ok) throw new Error("ipapi failed");
      return r.json();
    }).then(function(d){
      var lat = d.latitude, lon = d.longitude;
      var place = { city: d.city || "Your Location", state: d.region_code || d.region || "", country: d.country_code || "" };
      if (typeof lat === "number" && typeof lon === "number"){
        loadFromCoords(lat, lon, place);
      } else {
        throw new Error("No coordinates from ipapi");
      }
    }).catch(function(){
      els.city.textContent = "Location unavailable";
      els.region.textContent = "Enable location access to see live data";
      els.adviceText.textContent = "We couldn't determine your location — try enabling location services.";
      renderTicker([{ text:"LOCATION UNAVAILABLE: Grant location access for live commute data.", type:"hazard" }]);
    });
  }

  function init(){
    if (navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        function(pos){
          loadFromCoords(pos.coords.latitude, pos.coords.longitude, null);
        },
        function(){
          fallbackToIp();
        },
        { timeout: 8000, maximumAge: CACHE_TTL_MS }
      );
    } else {
      fallbackToIp();
    }
  }

  init();
})();
</script>
</body>
</html>
