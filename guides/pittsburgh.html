<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pittsburgh Morning Commute Weather Brief & Road Hazards</title>
<meta name="description" content="Live morning commute weather for Pittsburgh. Real-time conditions, marine layer fog alerts, rain probability, and local highway visibility for I-376 Parkway & I-279 Parkway North.">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<style>
  :root{
    --bg:#0F172A;
    --bg-deep:#0A1120;
    --panel:rgba(30,41,59,0.55);
    --panel-border:rgba(148,163,184,0.14);
    --text:#E7ECF5;
    --muted:#8CA0B8;
    --muted-dim:#5C6B82;
    --cyan:#38BDF8;
    --teal:#2DD4BF;
    --violet:#A78BFA;
    --amber:#FBBF24;
    --amber-bright:#FFD700;
    --red:#F87171;
    --track:rgba(148,163,184,0.16);
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:8px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(circle at 15% 0%, rgba(56,189,248,0.10), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(167,139,250,0.09), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
  }

  .wrap{
    max-width:860px;
    margin:0 auto;
    padding:28px 18px 40px;
    display:flex;
    flex-direction:column;
    gap:16px;
    min-height:100vh;
  }

  /* ---------- Header & Hero Gauge ---------- */
  header.brief-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:20px 24px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    overflow:hidden;
    position:relative;
  }

  .hero-ghost-number {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-50%);
    font-size: clamp(70px, 14vw, 110px);
    font-weight: 900;
    color: var(--cyan);
    opacity: 0.05;
    pointer-events: none;
    line-height: 1;
    z-index: 1;
  }

  .header-info{
    display:flex;
    flex-direction:column;
    gap:16px;
    z-index:2;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .brand .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--cyan);
    font-weight:700;
  }
  .brand h1{
    margin:0;
    font-size:19px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .location-line{
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .location-line .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
    flex-shrink:0;
  }
  .clock-block{
    text-align:left;
  }
  .clock-time{
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .clock-date{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }

  .hero-gauge-container{
    position:relative;
    width:190px;
    flex-shrink:0;
    margin:-10px -15px -20px 0;
    z-index: 2;
  }

  .gauge-svg-wrap{
    position:relative;
    width:100%;
    line-height:0;
  }
  .gauge-svg-wrap svg{
    width:100%;
    height:auto;
    display:block;
    overflow:visible;
  }
  .gauge-data{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    padding-bottom:12%;
    pointer-events:none;
  }

  .humidity-data-stack {
    padding-bottom: 18%;
  }

  .gauge-track{
    fill:none;
    stroke:var(--track);
    stroke-width:14;
    stroke-linecap:round;
  }
  
  .hero-gauge-container .gauge-track { stroke:rgba(148,163,184,0.06); }
  .hero-gauge-container .gauge-fill.temp { opacity: 0.35; stroke:var(--cyan); stroke-width:14; filter:drop-shadow(0 0 2px rgba(56,189,248,0.2)); }
  .hero-gauge-container .gauge-fill.high-marker { opacity: 0.4; stroke: var(--amber); stroke-dasharray: 4 6; stroke-width: 14; }
  
  .gauge-fill { fill:none; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
  .gauge-fill.feels-glow { stroke-width:14; opacity:0.85; transition: stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1), stroke 0.5s ease; }
  .glow-neutral { stroke:var(--violet); filter:drop-shadow(0 0 10px var(--violet)); }
  .glow-hot { stroke:var(--red); filter:drop-shadow(0 0 10px var(--red)); }
  .glow-cool { stroke:var(--teal); filter:drop-shadow(0 0 10px var(--teal)); }

  .gauge-fill.humidity-glow {
    stroke:var(--teal);
    stroke-width:14;
    opacity:0.25;
    filter:drop-shadow(0 0 6px var(--teal));
  }
  .sun-dot-punched {
    fill: var(--amber-bright);
    stroke: var(--bg-deep);
    stroke-width: 3.5;
    filter: drop-shadow(0 0 6px var(--amber-bright));
    transition: cx 1s ease-out, cy 1s ease-out;
  }

  .hero-val-wrap{
    display:flex;
    align-items:flex-start;
    line-height:1;
  }
  .hero-val{
    font-size:52px;
    font-weight:800;
    color:var(--text);
    letter-spacing:-0.04em;
  }
  .hero-unit{
    font-size:18px;
    font-weight:700;
    color:var(--muted);
    margin:6px 0 0 2px;
  }
  .hero-subtext{
    display:flex;
    gap:8px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.02em;
    margin-top:6px;
  }
  
  .standard-val-wrap{
    display:flex;
    align-items:baseline;
    line-height:1;
  }
  .standard-val{
    font-size:36px;
    font-weight:900;
    color:var(--text);
    letter-spacing:-0.03em;
  }
  .standard-unit{
    font-size:15px;
    font-weight:700;
    color:var(--muted);
    margin-left:2px;
  }
  .standard-subtext{
    font-size:12px;
    font-weight:700;
    margin-top:4px;
    letter-spacing:0.03em;
  }

  .daylight-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 98%;
    position: absolute;
    bottom: 2%;
  }
  .daylight-footer span {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }
  .daylight-footer span:nth-child(1) { text-align: left; }
  .daylight-footer span:nth-child(2) { text-align: center; color: var(--amber); font-size: 12px; margin-bottom: -1px; }
  .daylight-footer span:nth-child(3) { text-align: right; }

  .purple { color: var(--violet); transition: color 0.3s; }
  .amber { color: var(--amber); transition: color 0.3s; }
  .teal { color: var(--teal); transition: color 0.3s; }
  .red { color: var(--red); transition: color 0.3s; }

  .gauge-row{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
  }
  .gauge-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:16px 14px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    overflow:hidden;
  }
  .gauge-label{
    margin-top:8px;
    font-size:10.5px;
    letter-spacing:0.10em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
  }

  .split-card {
    display: block;
    padding: 0;
    position: relative;
    isolation: isolate;
    min-height: 125px;
    overflow: hidden;
  }
  .split-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 48.5%, var(--amber) 49%, var(--amber) 50%, rgba(45,212,191,0.12) 50.5%);
    z-index: -1;
    border-radius: var(--radius-lg);
  }

  .split-card::after {
    content: '💨';
    position: absolute;
    left: 10px;
    bottom: 5px;
    font-size: 64px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
  }
  .rain-watermark {
    position: absolute;
    right: 15px;
    top: 5px;
    font-size: 64px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
  }

  .split-section {
    position: absolute;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }
  .split-top-left {
    top: 18px;
    left: 20px;
    align-items: flex-start;
    text-align: left;
  }
  .split-bottom-right {
    bottom: 18px;
    right: 20px;
    align-items: flex-end;
    text-align: right;
  }
  
  .split-val-large {
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
    color: var(--amber);
    letter-spacing: -0.03em;
  }
  .split-val-unit {
    font-size: 11.5px; font-weight: 700; color: var(--amber);
    margin-top: 3px; display: flex; align-items: center; gap: 4px;
  }
  .split-val-small {
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .split-label-text {
    font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }

  .advice-box{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-lg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .advice-icon{
    font-size:28px;
    flex-shrink:0;
    line-height:1;
  }
  .advice-text-block .advice-eyebrow{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:700;
    margin-bottom:3px;
  }
  .advice-text{
    font-size:15px;
    line-height:1.45;
    color:var(--text);
  }

  /* ---------- Alerts & UV Container ---------- */
  .status-stack {
    display:flex;
    flex-direction:column;
    background:#000;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius-md);
    overflow:hidden;
  }
  
  .ticker{
    position:relative;
    height:38px;
    display:flex;
    align-items:center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .ticker .live-tag{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:6px;
    background:#1a0000;
    color:var(--red);
    font-size:11px;
    font-weight:800;
    letter-spacing:0.08em;
    padding:0 12px;
    height:100%;
    border-right:1px solid rgba(255,255,255,0.08);
    z-index:2;
    font-family:'Courier New',monospace;
  }
  .live-tag .pulse{
    width:7px;height:7px;border-radius:50%;
    background:var(--red);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.35;transform:scale(0.75);}
  }
  .ticker-viewport{
    flex:1;
    overflow:hidden;
    height:100%;
    position:relative;
  }
  .ticker-track{
    position:absolute;
    white-space:nowrap;
    display:flex;
    align-items:center;
    height:100%;
    animation:marquee 28s linear infinite;
    will-change:transform;
  }
  .ticker-track span{
    font-family:'Courier New',monospace;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.02em;
    color:#F1F5F9;
    padding-right:48px;
  }
  .ticker-track span.hazard{color:var(--amber);}
  .ticker-track span.clear{color:var(--teal);}
  @keyframes marquee{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
  }

  /* Micro UV Bar */
  .uv-micro-bar {
    height: 22px;
    display:flex;
    align-items:center;
    padding: 0 12px;
    gap: 12px;
    background: #0A1120;
  }
  .uv-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 700;
    flex-shrink:0;
  }
  .uv-track {
    flex: 1;
    height: 4px;
    background: linear-gradient(to right, var(--teal) 20%, var(--amber) 60%, var(--red) 90%);
    border-radius: 2px;
    position: relative;
  }
  .uv-indicator {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    background: #FFF;
    border-radius: 50%;
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
    transition: left 1s ease-out;
    left: 0%;
  }
  .uv-value {
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    width: 24px;
    text-align: right;
  }

  /* ==========================================================================
     MOBILE RESPONSIVE OVERHAUL (SINGLE-COLUMN EDGE-TO-EDGE)
     ========================================================================== */
  @media (max-width:520px){
    .gauge-row{grid-template-columns:1fr; gap:12px;}
    .gauge-card{flex-direction:column; padding:14px 16px 12px;}
    
    .gauge-svg-wrap{width:100%; max-width:none;}
    .gauge-label{display:block;}
    .humidity-data-stack { padding-bottom: 12px; }
    
    header.brief-header{
      flex-direction:column; 
      align-items:flex-start; 
      padding:24px 20px;
      min-height: 185px;
    }
    .clock-block{text-align:left; margin-top:8px;}
    
    .hero-ghost-number { 
      right: 15px; 
      top: 50%; 
      font-size: 140px; 
      opacity: 0.07;
    }
    .hero-gauge-container{
      position:absolute;
      right: 15px;
      bottom: 10px;
      width: 170px; 
      margin: 0;
    }
    
    .hero-val{font-size:44px;}
    .hero-subtext{font-size:11px; gap:6px;}
    
    .standard-val{font-size:42px;}
    .standard-unit{font-size:15px;}
    .standard-subtext{font-size:13px;}
    
    .daylight-footer { width: 98%; bottom: 6px; }
    .daylight-footer span { font-size: 11px; }
    .daylight-footer span:nth-child(2) { font-size: 13px; }
    
    .split-card{min-height:130px; padding:0;}
    .split-top-left { top: 18px; left: 20px; }
    .split-bottom-right { bottom: 18px; right: 20px; }
    .split-val-large, .split-val-small { font-size: 32px; }
  }

  a{color:var(--cyan);}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}
</style>

<link rel="canonical" href="https://morningst.art/guides/pittsburgh.html">
</head>
<body>
<div class="wrap">

  <header class="brief-header">
    <div class="hero-ghost-number" id="hero-ghost-val">--</div>
    <div class="header-info">
      <div class="brand">
        <div class="eyebrow" id="city-eyebrow">Loading Brief</div>
        <h1 id="city-name">Loading City...</h1>
        <div class="location-line"><span class="dot"></span><span id="region-name">California, USA</span></div>
      </div>
      <div class="clock-block">
        <div class="clock-time" id="clock-time">--:--</div>
        <div class="clock-date" id="clock-date">—</div>
      </div>
    </div>
    
    <!-- Hero Temperature Arc -->
    <div class="hero-gauge-container">
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 200 130" aria-label="Temperature gauge">
          <path class="gauge-track" d="M 20 100 A 80 80 0 0 1 180 100"/>
          <path class="gauge-fill high-marker" id="gauge-temp-high-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
          <path class="gauge-fill feels-glow glow-neutral" id="gauge-temp-feels-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
          <path class="gauge-fill temp" id="gauge-temp-arc" d="M 20 100 A 80 80 0 0 1 180 100"/>
        </svg>
        <div class="gauge-data">
          <div class="hero-val-wrap">
            <span class="hero-val" id="gauge-temp-val">--</span><span class="hero-unit">°F</span>
          </div>
          <div class="hero-subtext">
            <span class="purple" id="gauge-temp-feels-val">Feels --°</span>
            <span class="amber" id="gauge-temp-high-val">High --°</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="gauge-row" style="grid-template-columns: 1fr;">
    <!-- 1. Wide Combined Humidity & Sunrise Gauge -->
    <div class="gauge-card">
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 280 130" aria-label="Wide Humidity and Daylight gauge">
          <!-- Scaled wide path from x=20 to x=260 (Radius 120) -->
          <path class="gauge-track" d="M 20 100 A 120 120 0 0 1 260 100"/>
          <path class="gauge-fill humidity-glow" id="gauge-humidity-arc" d="M 20 100 A 120 120 0 0 1 260 100"/>
          <circle id="sun-dot" class="sun-dot-punched" cx="20" cy="100" r="7" />
        </svg>
        
        <div class="gauge-data humidity-data-stack">
          <div class="standard-val-wrap">
            <span class="standard-val" id="gauge-humidity-val">--</span><span class="standard-unit">%</span>
          </div>
          <div class="standard-subtext teal" id="gauge-dew-val">Dew Pt --°</div>
          
          <div class="daylight-footer" style="width: 96%; left: 2%;">
            <span id="sun-rise-time">--:--</span>
            <span class="daylight-status amber" id="sun-status-text">--</span>
            <span id="sun-set-time">--:--</span>
          </div>
        </div>
      </div>
      <div class="gauge-label">Humidity & Sunrise</div>
    </div>

    <!-- 2. Split Card (Wind & Rain) -->
    <div class="gauge-card split-card">
      <!-- Paste your original split-card inner HTML here if it was customized -->
      <!-- It was mostly fine in the original, so it should work -->
    </div>
  </section>

  <!-- Advice box -->
  <div class="advice-box">
    <div class="advice-icon" id="advice-icon">🌤️</div>
    <div class="advice-text-block">
      <div class="advice-eyebrow">MORNING ADVICE</div>
      <div class="advice-text" id="advice-text">Loading advice...</div>
    </div>
  </div>

  <!-- Keep all your other sections: ticker, UV bar, hazards, nav grids, featured cities, footer, etc. -->
  <!-- Copy them directly from your original _template.html -->

  <footer class="foot-note" style="margin-top:28px; border-top:1px solid var(--panel-border); padding-top:16px;">
    <div style="margin-bottom:10px; display:flex; justify-content:center; gap:16px; font-size:12px;">
      <a href="../index.html" style="color:var(--cyan); text-decoration:none;">← Global Dashboard</a>
      <span style="color:var(--muted-dim);">&middot;</span>
      <a href="../about.html" style="color:var(--cyan); text-decoration:none;">About</a>
      <span style="color:var(--muted-dim);">&middot;</span>
      <a href="../privacy.html" style="color:var(--cyan); text-decoration:none;">Privacy Policy</a>
      <span style="color:var(--muted-dim);">&middot;</span>
      <a href="../terms.html" style="color:var(--cyan); text-decoration:none;">Terms of Service</a>
    </div>
    <div style="font-size:11px; color:var(--muted-dim); text-align:center;">
      Morning Weather Brief &middot; Refreshes every 15 minutes
    </div>
  </footer>

</div>
<script src="../nav.js"></script>
<script>
(function(){
  "use strict";

  var CACHE_KEY = "morningWeatherBrief.cache"; // Gets overwritten below based on filename
  var CACHE_TTL_MS = 15 * 60 * 1000;
  var GAUGE_RADIUS = 80;
  var ARC_LENGTH = Math.PI * GAUGE_RADIUS;

  /* --- WIDE ARC METRICS FOR COMBINED GAUGE --- */
  var WIDE_RADIUS = 120;
  var WIDE_ARC_LENGTH = Math.PI * WIDE_RADIUS;

  var els = {
    city: document.getElementById("city-name"),
    region: document.getElementById("region-name"),
    time: document.getElementById("clock-time"),
    date: document.getElementById("clock-date"),
    adviceIcon: document.getElementById("advice-icon"),
    adviceText: document.getElementById("advice-text"),
    ticker: document.getElementById("ticker-track"),
    ghostVal: document.getElementById("hero-ghost-val"),
    gauges: {
      temp:      { arc: document.getElementById("gauge-temp-arc"),       val: document.getElementById("gauge-temp-val"),       min:0, max:120, radius: GAUGE_RADIUS, len: ARC_LENGTH },
      feelsGlow: { arc: document.getElementById("gauge-temp-feels-arc"), val: document.getElementById("gauge-temp-feels-val"), min:0, max:120, radius: GAUGE_RADIUS, len: ARC_LENGTH },
      humidity:  { arc: document.getElementById("gauge-humidity-arc"),   val: document.getElementById("gauge-humidity-val"),   min:0, max:100, radius: WIDE_RADIUS, len: WIDE_ARC_LENGTH }
    },
    tempHigh: {
      arc: document.getElementById("gauge-temp-high-arc"),
      val: document.getElementById("gauge-temp-high-val")
    },
    dewPointVal: document.getElementById("gauge-dew-val"),
    split: {
      windSpeed: document.getElementById("split-wind-speed"),
      windDir: document.getElementById("split-wind-dir"),
      rainVal: document.getElementById("split-rain-val")
    },
    solar: {
      dot: document.getElementById("sun-dot"),
      rise: document.getElementById("sun-rise-time"),
      set: document.getElementById("sun-set-time"),
      status: document.getElementById("sun-status-text")
    },
    uv: {
      dot: document.getElementById("uv-dot"),
      valText: document.getElementById("uv-val-text")
    }
  };

  // Setup Standard Arcs
  Object.keys(els.gauges).forEach(function(key){
    var g = els.gauges[key];
    if(g.arc){
      g.arc.style.strokeDasharray = g.len;
      g.arc.style.strokeDashoffset = g.len;
    }
  });

  if (els.tempHigh.arc) {
    els.tempHigh.arc.style.strokeDasharray = ARC_LENGTH;
    els.tempHigh.arc.style.strokeDashoffset = ARC_LENGTH;
  }

  // ---------------- Clock ----------------
  function tickClock(){
    var now = new Date();
    els.time.textContent = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    els.date.textContent = now.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------------- Render Functions ----------------
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v || 0)); }

  function setGauge(key, rawValue, displayValue){
    var g = els.gauges[key];
    if(!g.arc) return;

    var v = clamp(rawValue, g.min, g.max);
    var frac = (v - g.min) / (g.max - g.min);
    var offset = g.len * (1 - frac);
    
    if (key === 'humidity') {
      offset = Math.max(0, Math.min(g.len, offset)); // Prevent overshoot on wide arc
    }
    
    if(key === 'feelsGlow'){
      g.val.textContent = "Feels " + Math.round(v) + "°";
    } else {
      g.val.textContent = Math.round(v);
      if(key === 'temp' && els.ghostVal) {
        els.ghostVal.textContent = Math.round(v);
      }
    }
    
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        g.arc.style.strokeDashoffset = offset;
      });
    });
  }

  function setTempHighGauge(tempMax){
    if (!els.tempHigh.arc || !els.tempHigh.val || tempMax === null || tempMax === undefined) return;
    var minTemp = 0, maxTemp = 120;
    var clampedHigh = clamp(tempMax, minTemp, maxTemp);
    var frac = (clampedHigh - minTemp) / (maxTemp - minTemp);
    var offset = ARC_LENGTH * (1 - frac);
    
    els.tempHigh.val.textContent = "High " + Math.round(tempMax) + "°";
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        els.tempHigh.arc.style.strokeDashoffset = offset;
      });
    });
  }
  
  function renderSolarArc(sunriseIso, sunsetIso){
    if(!sunriseIso || !sunsetIso) return;
    var riseTime = new Date(sunriseIso);
    var setTime = new Date(sunsetIso);
    var now = new Date();
    
    els.solar.rise.textContent = riseTime.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
    els.solar.set.textContent = setTime.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});

    var totalMs = setTime - riseTime;
    var elapsedMs = now - riseTime;
    var progress = elapsedMs / totalMs;
    
    if (progress < 0 || progress > 1) {
      els.solar.status.textContent = "Sunrise";
    } else {
      els.solar.status.textContent = "Sunset";
    }

    var clampedProgress = Math.max(0, Math.min(1, progress));
    var angle = Math.PI - (clampedProgress * Math.PI);
    var cx = 140 + WIDE_RADIUS * Math.cos(angle);
    var cy = 100 - WIDE_RADIUS * Math.sin(angle);
    
    requestAnimationFrame(function(){
      els.solar.dot.setAttribute("cx", cx);
      els.solar.dot.setAttribute("cy", cy);
    });
  }

  function renderUV(uvIndex){
    var uv = (uvIndex !== null && uvIndex !== undefined) ? uvIndex : 0;
    if (els.uv.valText) {
      els.uv.valText.textContent = Math.round(uv);
    }
    if (els.uv.dot) {
      var uvPct = Math.min(100, Math.max(0, (uv / 11) * 100));
      requestAnimationFrame(function(){
        els.uv.dot.style.left = uvPct + "%";
      });
    }
  }

  function degToCompass(num) {
    if (num === null || num === undefined) return "";
    var val = Math.floor((num / 22.5) + 0.5);
    var arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
    return arr[(val % 16)];
  }

  function getAdvice(c){
    var rules = [
      { test: c.feels >= 95, icon:"🔥", msg:"Oppressive heat index today — stay hydrated and keep the air conditioning cranked." },
      { test: c.feels - c.temp >= 7, icon:"😓", msg:"High humidity is pushing the feels-like temp significantly higher than the actual reading." },
      { test: c.temp <= 32, icon:"🧊", msg:"Below freezing this morning — scrape the windshield and take corners slow." },
      { test: c.temp < 40 && c.wind > 15, icon:"🥶", msg:"Bitter wind chill on top of the cold — that light jacket won't cut it today." },
      { test: c.humidity > 70 && c.temp > 65 && c.precipProb > 20, icon:"💧", msg:"Muggy with a side of drizzle — expect fogged-up windows for the first few miles." },
      { test: c.wind > 20, icon:"💨", msg:"Hold onto your hat — gusty winds could nudge you around the lane." },
      { test: c.precipProb > 50, icon:"☔", msg:"Rain's basically guaranteed — grab the umbrella and pad your commute by a few minutes." },
      { test: c.humidity > 80 && c.precipProb <= 20, icon:"😓", msg:"Sticky air with no rain in sight — just an uncomfortable kind of humid." },
      { test: c.temp >= 60 && c.temp <= 80 && (c.code === 0 || c.code === 1), icon:"☀️", msg:"Clear skies and comfortable temps — about as good as mornings get." },
      { test: c.temp < 55 && (c.code === 0 || c.code === 1 || c.code === 2), icon:"🧥", msg:"Crisp and clear — light jacket weather, nothing dramatic." }
    ];
    for (var i = 0; i < rules.length; i++){ 
      if (rules[i].test) return rules[i]; 
    }
    return { icon:"🌤️", msg:"Standard-issue morning out there — nothing wild, just get out the door." };
  }

  function buildHazards(c){
    var hazards = [];
    if (c.visibilityMiles !== null && c.visibilityMiles < 3){
      hazards.push({ text:"FOG ALERT: Reduced morning visibility.", type:"hazard" });
    }
    if (c.precipProb > 20 || c.precip > 0.01){
      hazards.push({ text:"SLIPPERY ROADS: Drizzle/rain expected on the morning commute.", type:"hazard" });
    }
    if (c.wind > 18){
      hazards.push({ text:"HIGH WIND CAUTION: Watch for gusts on the highway.", type:"hazard" });
    }
    if (c.uv > 6){
      hazards.push({ text:"HIGH UV INDEX: Peak sun intensity during daylight hours today.", type:"hazard" });
    }
    if (c.feels > 88 || c.temp > 85){
      hazards.push({ text:"HEAT ADVISORY: High apparent temperature. Expect warm cabin temps.", type:"hazard" });
    }
    if (hazards.length === 0){
      hazards.push({ text:"WEATHER CLEAR: Optimal driving conditions. No weather hazards reported.", type:"clear" });
    }
    return hazards;
  }

  function renderTicker(hazards){
    var html = hazards.map(function(hz){
      return '<span class="' + hz.type + '">' + hz.text + '</span>';
    }).join("");
    els.ticker.innerHTML = html + html;
  }

  // Keep the rest of your original functions (readCache, writeCache, findCurrentHourIndex, applyFeelsLikeLogic, renderWeather, fetchWeather, loadCityData) exactly as they were in your original file.

  // Auto-initialize
  loadCityData();

})();
</script>
